syntax = "proto3";

package user;

option go_package = "github.com/kodaikumatani/grpc-cqrs-go/pkg/pb/user";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
}

message CreateUserResponse { string user_id = 1; }
